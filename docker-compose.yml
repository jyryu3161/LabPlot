x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:
  labplot-db:
    image: postgres:16-alpine
    container_name: labplot-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: labplot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: labplot
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - labplot_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labplot -d labplot"]
      interval: 10s
      timeout: 5s
      retries: 5

  labplot-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: labplot-backend
    restart: unless-stopped
    logging: *default-logging
    command: sh -lc "cd /app/backend && /app/.pixi/envs/default/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://labplot:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@labplot-db:5432/labplot
    ports:
      - "127.0.0.1:8071:8000"
    volumes:
      - ./backend/static:/app/backend/static
      - ./backend/private:/app/backend/private
    healthcheck:
      test: ["CMD-SHELL", "/app/.pixi/envs/default/bin/python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      labplot-db:
        condition: service_healthy

  labplot-frontend:
    build:
      context: ./frontend
    container_name: labplot-frontend
    restart: unless-stopped
    logging: *default-logging
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      labplot-backend:
        condition: service_healthy

  labplot-caddy:
    image: caddy:2-alpine
    container_name: labplot-caddy
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - labplot_caddy:/data
    depends_on:
      labplot-backend:
        condition: service_healthy
      labplot-frontend:
        condition: service_healthy

volumes:
  labplot_pg:
  labplot_caddy:
