name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile backend and scripts
        run: |
          PYTHONPYCACHEPREFIX=/tmp/labplot-pycache python -m py_compile $(find backend/app scripts -name '*.py' -not -path '*/__pycache__/*' -print)
      - name: Validate Compose config
        env:
          POSTGRES_PASSWORD: ci-postgres-password
        run: docker compose config --quiet

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
