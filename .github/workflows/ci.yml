name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile backend and scripts
        run: |
          PYTHONPYCACHEPREFIX=/tmp/labplot-pycache python -m py_compile $(find backend/app backend/alembic scripts -name '*.py' -not -path '*/__pycache__/*' -print)
      - name: Validate Compose config
        env:
          POSTGRES_PASSWORD: ci-postgres-password
        run: |
          # Compose declares env_file: .env, which isn't committed; seed it
          # from the tracked example so `config` can resolve interpolations.
          cp .env.example .env
          docker compose config --quiet

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      - run: npm run build

  security-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep OWASP scan
        run: >-
          docker run --rm
          -v "$PWD:/src" -w /src
          semgrep/semgrep:1.168.0
          semgrep scan --config p/owasp-top-ten --error
          backend/app frontend/src

  # Deploy to the self-hosted production box (labplotai.com). Runs ONLY on a
  # push to main and ONLY after both static/lint/build jobs pass, on the
  # self-hosted runner installed on the prod host. The runner user (ubuntu) is
  # in the docker group and owns the compose working tree, so it deploys the
  # exact origin/main tree via docker compose. pull_request events skip this
  # (the `if` guard) and never touch the box.
  deploy:
    needs: [backend-static, frontend, security-static]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, labplot-prod]
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - name: Sync working tree to origin/main
        run: |
          cd /home/ubuntu/web_projects/LabPlot
          git fetch --prune origin main
          git reset --hard origin/main
          echo "Deploying $(git rev-parse --short HEAD): $(git log -1 --pretty=%s)"
      - name: Build images and restart containers
        run: |
          cd /home/ubuntu/web_projects/LabPlot
          docker compose build
          docker compose run --rm --no-deps labplot-backend sh -lc "cd /app/backend && /app/.pixi/envs/default/bin/python -m unittest discover -s tests"
          docker compose up -d
          docker compose exec -T labplot-caddy caddy reload --config /etc/caddy/Caddyfile
      - name: Health check (containers + live site)
        run: |
          cd /home/ubuntu/web_projects/LabPlot
          for i in $(seq 1 40); do
            fe=$(docker inspect -f '{{.State.Health.Status}}' labplot-frontend 2>/dev/null || echo none)
            be=$(docker inspect -f '{{.State.Health.Status}}' labplot-backend 2>/dev/null || echo none)
            echo "attempt $i: frontend=$fe backend=$be"
            if [ "$fe" = healthy ] && [ "$be" = healthy ]; then
              code=$(curl -s -o /dev/null -w '%{http_code}' https://labplotai.com/canvases)
              echo "live /canvases -> HTTP $code"
              if [ "$code" = "200" ]; then
                static_code=$(curl -s -o /dev/null -w '%{http_code}' https://labplotai.com/static/figures/__health__/figure.png)
                [ "$static_code" = "404" ] || {
                  echo "::error::direct figure static path returned HTTP $static_code"
                  exit 1
                }
                html_headers=$(curl -sSI https://labplotai.com/api/assets/signed/invalid/figure.html)
                echo "$html_headers" | grep -qi '^x-frame-options: SAMEORIGIN' || {
                  echo "::error::interactive HTML X-Frame-Options is not SAMEORIGIN"
                  exit 1
                }
                if echo "$html_headers" | grep -qi '^x-frame-options: DENY'; then
                  echo "::error::interactive HTML still includes X-Frame-Options DENY"
                  exit 1
                fi
                echo "$html_headers" | grep -qi "frame-ancestors 'self'" || {
                  echo "::error::interactive HTML CSP does not allow same-origin framing"
                  exit 1
                }
                if echo "$html_headers" | grep -qi "frame-ancestors 'none'"; then
                  echo "::error::interactive HTML still includes frame-ancestors none"
                  exit 1
                fi
                exit 0
              fi
            fi
            sleep 5
          done
          echo "::error::deploy health check did not go green in time"
          exit 1
